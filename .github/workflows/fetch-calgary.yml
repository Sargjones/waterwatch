name: Fetch Calgary Water Data

on:
  schedule:
    # Every 6 hours, offset from Vancouver/Canmore runs
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfminer.six

      - name: Fetch Calgary data
        run: python scraper/fetch_calgary.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/calgary.json
          git diff --staged --quiet || git commit -m "chore: update calgary.json [skip ci]"
          git push
